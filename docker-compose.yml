version: '3.9'

services:

  app:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: people_app
    environment:
      - NODE_ENV=production
      - SESSION_SECRET=${SESSION_SECRET:-vp-prod-vendemmia-2025}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
    volumes:
      - ./frontend/database:/app/database
    restart: unless-stopped
    networks:
      - people_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  nginx:
    image: nginx:1.25-alpine
    container_name: people_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - people_net

networks:
  people_net:
    driver: bridge
